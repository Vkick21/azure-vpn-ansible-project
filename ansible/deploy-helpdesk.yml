---
- name: Upewnij sie, ze Nginx jest gotowy
  ansible.builtin.import_playbook: nginx.yml

- name: Wdroz aplikacje Django HelpDesk
  hosts: helpdesk
  become: true

  vars:
    app_root: /opt/helpdesk
    app_code: /opt/helpdesk/app
    app_venv: /opt/helpdesk/venv
    key_vault_name: "{{ lookup('ansible.builtin.env', 'KEY_VAULT_NAME') }}"
    database_host: 10.10.5.4
    load_balancer_ip: "{{ lookup('ansible.builtin.env', 'HELPDESK_PUBLIC_IP') }}"
    helpdesk_domain: "{{ lookup('ansible.builtin.env', 'HELPDESK_FQDN') }}"
    operator_domain: "{{ lookup('ansible.builtin.env', 'HELPDESK_OPERATOR_FQDN') }}"
    entra_tenant_id: "{{ lookup('ansible.builtin.env', 'ENTRA_TENANT_ID') }}"
    entra_client_id: "{{ lookup('ansible.builtin.env', 'ENTRA_CLIENT_ID') }}"
    entra_operator_group_id: "{{ lookup('ansible.builtin.env', 'ENTRA_OPERATOR_GROUP_ID') }}"
    recaptcha_site_key: "{{ lookup('ansible.builtin.env', 'RECAPTCHA_SITE_KEY') }}"

  tasks:
    # Aplikacja dziala na osobnym koncie bez dostepu do logowania.
    - name: Utworz uzytkownika aplikacji
      ansible.builtin.user:
        name: helpdesk
        system: true
        shell: /usr/sbin/nologin
        home: "{{ app_root }}"
        create_home: true

    - name: Zainstaluj narzedzia Python
      ansible.builtin.apt:
        name:
          - python3-venv
          - python3-pip
          - rsync
          - acl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Przygotuj katalog aplikacji
      ansible.builtin.file:
        path: "{{ app_code }}"
        state: directory
        owner: helpdesk
        group: helpdesk
        mode: "0755"

    # Rsync przesyla tylko faktycznie zmienione pliki.
    - name: Synchronizuj kod HelpDesk
      ansible.posix.synchronize:
        src: ../app/
        dest: "{{ app_code }}/"
        delete: true
        recursive: true
        use_ssh_args: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--chown=helpdesk:helpdesk"
          - "--no-perms"
          - "--omit-dir-times"
          - "--exclude=__pycache__/"
          - "--exclude=*.pyc"
          - "--exclude=staticfiles/"
      notify: Uruchom ponownie HelpDesk

    - name: Utworz srodowisko Python
      ansible.builtin.command:
        cmd: "python3 -m venv {{ app_venv }}"
        creates: "{{ app_venv }}/bin/python"

    - name: Zainstaluj zaleznosci aplikacji
      ansible.builtin.pip:
        requirements: "{{ app_code }}/requirements.txt"
        virtualenv: "{{ app_venv }}"
      notify: Uruchom ponownie HelpDesk

    # Systemd uruchamia aplikacje automatycznie po restarcie VM.
    - name: Dodaj usluge systemd
      ansible.builtin.copy:
        dest: /etc/systemd/system/helpdesk.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Azure HelpDesk Django
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=helpdesk
          Group=helpdesk
          WorkingDirectory={{ app_code }}
          Environment=KEY_VAULT_NAME={{ key_vault_name }}
          Environment=DATABASE_HOST={{ database_host }}
          Environment=DATABASE_NAME=helpdesk
          Environment=DATABASE_USER=helpdesk_app
          Environment=AZURE_STORAGE_ACCOUNT={{ storage_account_name }}
          Environment=DJANGO_ALLOWED_HOSTS={{ helpdesk_domain }},{{ operator_domain }},{{ load_balancer_ip }},10.10.1.4,10.10.1.5,localhost,127.0.0.1
          Environment=DJANGO_CSRF_TRUSTED_ORIGINS=https://{{ helpdesk_domain }},https://{{ operator_domain }}
          Environment=HELPDESK_PUBLIC_URL=https://{{ helpdesk_domain }}
          Environment=HELPDESK_OPERATOR_URL=https://{{ operator_domain }}
          Environment=DJANGO_HTTPS_ENABLED=true
          Environment=ENTRA_TENANT_ID={{ entra_tenant_id }}
          Environment=ENTRA_CLIENT_ID={{ entra_client_id }}
          Environment=ENTRA_OPERATOR_GROUP_ID={{ entra_operator_group_id }}
          Environment=RECAPTCHA_ENABLED=true
          Environment=RECAPTCHA_SITE_KEY={{ recaptcha_site_key }}
          ExecStart={{ app_venv }}/bin/gunicorn --workers 2 --threads 2 --bind 127.0.0.1:8000 helpdesk.wsgi:application
          Restart=always
          RestartSec=5
          PrivateTmp=true
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
      notify:
        - Przeladuj systemd
        - Uruchom ponownie HelpDesk

    # Kod i zmienne uslugi musza dzialac przed migracja oraz kolejnymi testami.
    - name: Zastosuj zmiany aplikacji przed migracja
      ansible.builtin.meta: flush_handlers

    # Migracje wspolnej bazy wykonuje tylko pierwszy serwer.
    - name: Wykonaj migracje bazy
      ansible.builtin.command:
        cmd: "{{ app_venv }}/bin/python manage.py migrate --noinput"
        chdir: "{{ app_code }}"
      become_user: helpdesk
      environment:
        KEY_VAULT_NAME: "{{ key_vault_name }}"
        DATABASE_HOST: "{{ database_host }}"
        DATABASE_NAME: helpdesk
        DATABASE_USER: helpdesk_app
        DJANGO_ALLOWED_HOSTS: "localhost"
      run_once: true
      register: migrations
      changed_when: "'Applying' in migrations.stdout"

    - name: Utworz pierwsze konto administratora
      ansible.builtin.command:
        cmd: "{{ app_venv }}/bin/python manage.py bootstrap_admin"
        chdir: "{{ app_code }}"
      become_user: helpdesk
      environment:
        KEY_VAULT_NAME: "{{ key_vault_name }}"
        DATABASE_HOST: "{{ database_host }}"
        DATABASE_NAME: helpdesk
        DATABASE_USER: helpdesk_app
        DJANGO_ALLOWED_HOSTS: "localhost"
      run_once: true
      register: admin_account
      changed_when: "'CREATED' in admin_account.stdout"
      no_log: true

    - name: Zbierz pliki statyczne
      ansible.builtin.command:
        cmd: "{{ app_venv }}/bin/python manage.py collectstatic --noinput"
        chdir: "{{ app_code }}"
      become_user: helpdesk
      environment:
        KEY_VAULT_NAME: "{{ key_vault_name }}"
        DATABASE_HOST: "{{ database_host }}"
        DATABASE_NAME: helpdesk
        DATABASE_USER: helpdesk_app
        DJANGO_ALLOWED_HOSTS: "localhost"
      register: static_files
      changed_when: "'0 static files copied' not in static_files.stdout"

    - name: Sprawdz czy certyfikat HTTPS jest juz dostepny
      ansible.builtin.stat:
        path: /etc/nginx/ssl/vkickhamster/fullchain.pem
      register: tls_certificate

    # Panel administratora jest dostepny tylko od strony VPN lub Bastiona.
    # Nginx moze przejsc do zebranych plikow, ale nie dostaje prawa listowania katalogu domowego.
    - name: Daj Nginx dostep do katalogu aplikacji
      ansible.posix.acl:
        path: /opt/helpdesk
        entity: www-data
        etype: user
        permissions: x
        state: present
    - name: Skonfiguruj Nginx jako reverse proxy
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              location /static/ {
                  alias {{ app_code }}/staticfiles/;
              }

              location /admin/ {
                  allow 172.20.200.0/24;
                  allow 10.10.4.0/26;
                  deny all;

                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }

              location / {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }
      notify: Przeladuj Nginx
      when: not tls_certificate.stat.exists

    - name: Uruchom usluge HelpDesk
      ansible.builtin.systemd:
        name: helpdesk
        state: started
        enabled: true
        daemon_reload: true

    - name: Zastosuj zmiany uslug
      ansible.builtin.meta: flush_handlers

    - name: Sprawdz lokalny endpoint zdrowia
      ansible.builtin.uri:
        url: http://127.0.0.1:8000/health/
        status_code: 200
      register: health_check
      retries: 6
      delay: 5
      until: health_check.status == 200

  handlers:
    - name: Przeladuj systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Uruchom ponownie HelpDesk
      ansible.builtin.systemd:
        name: helpdesk
        state: restarted

    - name: Przeladuj Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

# HTTPS jest nakladany po wdrozeniu aplikacji, gdy certyfikat jest juz dostepny.
- name: Utrzymaj HTTPS dla VKICKHAMSTER
  ansible.builtin.import_playbook: https.yml
