---
- name: Sprawdz publiczny dostep do HelpDesk
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Sprawdz health probe przez Load Balancer
      ansible.builtin.uri:
        url: "https://{{ helpdesk_domain }}/health/"
        return_content: true
        status_code: 200
      register: public_health
      failed_when: public_health.json.database != "available"

    - name: Potwierdz blokade publicznego panelu administratora
      ansible.builtin.uri:
        url: "https://{{ helpdesk_domain }}/admin/"
        status_code: 403

    - name: Potwierdz przekierowanie HTTP do HTTPS
      ansible.builtin.uri:
        url: "http://{{ helpdesk_domain }}/"
        follow_redirects: none
        status_code: 301

- name: Sprawdz oba backendy aplikacji
  hosts: helpdesk
  become: true

  tasks:
    - name: Sprawdz usluge HelpDesk
      ansible.builtin.command:
        cmd: systemctl is-active helpdesk
      changed_when: false

    - name: Sprawdz lokalne polaczenie z baza
      ansible.builtin.uri:
        url: http://127.0.0.1:8000/health/
        return_content: true
        status_code: 200
      register: backend_health
      failed_when: backend_health.json.database != "available"

    - name: Sprawdz certyfikat na serwerze
      ansible.builtin.command:
        cmd: openssl x509 -in /etc/nginx/ssl/vkickhamster/fullchain.pem -noout -checkend 2592000
      changed_when: false

    - name: Sprawdz timer synchronizacji certyfikatu
      ansible.builtin.command:
        cmd: systemctl is-active helpdesk-certificate-sync.timer
      changed_when: false
    - name: Sprawdz plik zalacznika w Azure Storage
      ansible.builtin.command:
        argv:
          - /opt/helpdesk/venv/bin/python
          - manage.py
          - shell
          - -c
          - >-
            from django.core.files.storage import default_storage;
            from tickets.models import Ticket;
            ticket = Ticket.objects.exclude(attachment="").latest("created_at");
            print(default_storage.exists(ticket.attachment.name))
        chdir: /opt/helpdesk/app
      environment:
        KEY_VAULT_NAME: "{{ key_vault_name }}"
        DATABASE_HOST: 10.10.5.4
        DATABASE_NAME: helpdesk
        DATABASE_USER: helpdesk_app
        DJANGO_ALLOWED_HOSTS: localhost
        AZURE_STORAGE_ACCOUNT: "{{ storage_account_name }}"
      register: attachment_exists
      changed_when: false
      run_once: true

    - name: Potwierdz obecnosc zalacznika
      ansible.builtin.assert:
        that:
          - attachment_exists.stdout_lines | last == "True"
        fail_msg: "Zalacznik nie zostal znaleziony w Azure Storage."
        success_msg: "Zalacznik istnieje w prywatnym kontenerze Azure Storage."
      run_once: true

- name: Sprawdz dane zapisane w PostgreSQL
  hosts: database
  become: true

  tasks:
    - name: Policz zgloszenia HelpDesk
      ansible.builtin.command:
        argv:
          - runuser
          - -u
          - postgres
          - --
          - psql
          - -d
          - helpdesk
          - -tAc
          - "SELECT count(*) FROM tickets_ticket;"
      register: ticket_count
      changed_when: false

    - name: Potwierdz zapis co najmniej jednego zgloszenia
      ansible.builtin.assert:
        that:
          - ticket_count.stdout | trim | int >= 1
        fail_msg: "W bazie nie znaleziono testowego zgloszenia."
        success_msg: "Zgloszenia sa poprawnie zapisane w PostgreSQL."
    - name: Sprawdz aktywny timer backupu
      ansible.builtin.command:
        cmd: systemctl is-active helpdesk-backup.timer
      changed_when: false

    - name: Policz backupy w Azure Storage
      ansible.builtin.command:
        argv:
          - /opt/helpdesk-backup/venv/bin/python
          - -c
          - >-
            from azure.identity import ManagedIdentityCredential;
            from azure.storage.blob import BlobServiceClient;
            service = BlobServiceClient(
              account_url="https://{{ storage_account_name }}.blob.core.windows.net",
              credential=ManagedIdentityCredential()
            );
            print(sum(1 for blob in service.get_container_client("backups").list_blobs(name_starts_with="postgresql/")))
      register: backup_count
      changed_when: false

    - name: Potwierdz obecnosc backupu
      ansible.builtin.assert:
        that:
          - backup_count.stdout | trim | int >= 1
        fail_msg: "Nie znaleziono backupu PostgreSQL w Azure Storage."
        success_msg: "Backup PostgreSQL istnieje w prywatnym kontenerze Azure Storage."