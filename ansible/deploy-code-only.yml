---
- name: Wdroz kod aplikacji bez zmian w bazie
  hosts: helpdesk
  become: true

  vars:
    app_code: /opt/helpdesk/app
    app_venv: /opt/helpdesk/venv
    key_vault_name: "{{ lookup('ansible.builtin.env', 'KEY_VAULT_NAME') }}"
    database_host: 10.10.5.4
    helpdesk_domain: "{{ lookup('ansible.builtin.env', 'HELPDESK_FQDN') }}"
    entra_tenant_id: "{{ lookup('ansible.builtin.env', 'ENTRA_TENANT_ID') }}"
    entra_client_id: "{{ lookup('ansible.builtin.env', 'ENTRA_CLIENT_ID') }}"
    entra_operator_group_id: "{{ lookup('ansible.builtin.env', 'ENTRA_OPERATOR_GROUP_ID') }}"

  tasks:
    # Ta sciezka sluzy do zmian interfejsu, ktore nie wymagaja migracji.
    - name: Synchronizuj kod aplikacji
      ansible.posix.synchronize:
        src: ../app/
        dest: "{{ app_code }}/"
        delete: true
        recursive: true
        use_ssh_args: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--chown=helpdesk:helpdesk"
          - "--no-perms"
          - "--omit-dir-times"
          - "--exclude=__pycache__/"
          - "--exclude=*.pyc"
          - "--exclude=staticfiles/"
          - "--exclude=media/"

    - name: Zainstaluj zaleznosci aplikacji
      ansible.builtin.pip:
        requirements: "{{ app_code }}/requirements.txt"
        virtualenv: "{{ app_venv }}"
    - name: Zbierz pliki statyczne
      ansible.builtin.command:
        cmd: "{{ app_venv }}/bin/python manage.py collectstatic --noinput"
        chdir: "{{ app_code }}"
      become_user: helpdesk
      environment:
        KEY_VAULT_NAME: "{{ key_vault_name }}"
        DATABASE_HOST: "{{ database_host }}"
        DATABASE_NAME: helpdesk
        DATABASE_USER: helpdesk_app
        DJANGO_ALLOWED_HOSTS: "{{ helpdesk_domain }},localhost"
        AZURE_STORAGE_ACCOUNT: "{{ storage_account_name }}"
        ENTRA_TENANT_ID: "{{ entra_tenant_id }}"
        ENTRA_CLIENT_ID: "{{ entra_client_id }}"
        ENTRA_OPERATOR_GROUP_ID: "{{ entra_operator_group_id }}"
      register: static_files
      changed_when: "'0 static files copied' not in static_files.stdout"

    # Nginx moze przejsc do zebranych plikow, ale nie dostaje prawa listowania katalogu domowego.
    - name: Daj Nginx dostep do katalogu aplikacji
      ansible.posix.acl:
        path: /opt/helpdesk
        entity: www-data
        etype: user
        permissions: x
        state: present
    - name: Przygotuj katalog ustawien uslugi
      ansible.builtin.file:
        path: /etc/systemd/system/helpdesk.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    # Drop-in dodaje Entra bez przepisywania calej istniejacej uslugi.
    - name: Przygotuj ustawienia Entra dla uslugi
      ansible.builtin.copy:
        dest: /etc/systemd/system/helpdesk.service.d/entra.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Service]
          Environment=ENTRA_TENANT_ID={{ entra_tenant_id }}
          Environment=ENTRA_CLIENT_ID={{ entra_client_id }}
          Environment=ENTRA_OPERATOR_GROUP_ID={{ entra_operator_group_id }}
    - name: Uruchom ponownie aplikacje
      ansible.builtin.systemd:
        name: helpdesk
        state: restarted
        daemon_reload: true

    - name: Sprawdz aplikacje po wdrozeniu
      ansible.builtin.uri:
        url: http://127.0.0.1:8000/health/
        return_content: true
        status_code: 200
      register: health_check
      retries: 6
      delay: 5
      until:
        - health_check.status == 200
        - health_check.json.database == "available"
