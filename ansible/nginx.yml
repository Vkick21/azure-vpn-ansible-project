---
- name: Przygotuj Nginx na serwerach HelpDesk
  hosts: helpdesk
  become: true

  tasks:
    # Cache pakietow jest odswiezany najwyzej raz na godzine.
    - name: Odswiez liste pakietow
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Zainstaluj Nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Uruchom Nginx przy starcie systemu
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true