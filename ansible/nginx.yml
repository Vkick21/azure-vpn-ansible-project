---
- name: Przygotuj Nginx na serwerach HelpDesk
  hosts: helpdesk
  become: true

  tasks:
    # Cache pakietów jest odświeżany najwyżej raz na godzinę.
    - name: Odśwież listę pakietów
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Zainstaluj Nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Uruchom Nginx przy starcie systemu
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true