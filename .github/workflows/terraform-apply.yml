name: Terraform apply from Azure runner

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Wpisz APPLY po zaakceptowaniu aktualnego planu
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ inputs.confirmation == 'APPLY' }}
    environment: production
    runs-on: [self-hosted, linux, vkickhamster-mgmt]
    env:
      ARM_USE_AZUREAD: "true"
      ARM_USE_CLI: "true"
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_helpdesk_dns_label: ${{ vars.TF_VAR_HELPDESK_DNS_LABEL }}
      TF_VAR_operator_dns_label: ${{ vars.TF_VAR_OPERATOR_DNS_LABEL }}
      TF_VAR_private_only: ${{ vars.TF_VAR_PRIVATE_ONLY }}
      TF_VAR_additional_key_vault_admin_object_ids: ${{ vars.TF_VAR_KEY_VAULT_ADMIN_OBJECT_IDS }}
      TF_VAR_ssh_public_key_path: ${{ github.workspace }}/.ci/id_ed25519.pub
      TF_VAR_vpn_root_certificate_base64: ${{ vars.TF_VPN_ROOT_CERTIFICATE_BASE64 }}
      TF_SSH_PUBLIC_KEY: ${{ vars.TF_SSH_PUBLIC_KEY }}

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v7

      - name: Zaloguj Managed Identity
        run: az login --identity --output none

      - name: Zainstaluj Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6
          terraform_wrapper: false

      - name: Przygotuj niezmieniony klucz deklarowany przez Terraform
        run: |
          mkdir -p .ci
          printf '%s\n' "$TF_SSH_PUBLIC_KEY" > .ci/id_ed25519.pub

      - name: Przygotuj zatwierdzony plan
        run: |
          terraform init -reconfigure -backend-config="use_azuread_auth=true"
          terraform validate
          terraform plan -out=tfplan -no-color

      - name: Wykonaj zatwierdzony plan
        run: terraform apply -no-color tfplan
